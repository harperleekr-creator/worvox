name: Scheduled Billing & Notifications

on:
  schedule:
    # 매 6시간마다 실행 (UTC 기준: 00:00, 06:00, 12:00, 18:00)
    # KST 기준: 09:00, 15:00, 21:00, 03:00
    - cron: '0 */6 * * *'
  
  # 수동 실행 가능 (테스트용)
  workflow_dispatch:

jobs:
  execute-billing:
    runs-on: ubuntu-latest
    
    steps:
      - name: Send Trial Reminders & Execute Auto Billing
        run: |
          echo "🔔 Executing scheduled billing job..."
          
          # Call billing execute endpoint
          RESPONSE=$(curl -s -w "\n%{http_code}" -X POST "https://worvox.com/api/payments/billing/execute" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json")
          
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | sed '$d')
          
          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"
          
          if [ "$HTTP_CODE" -eq 200 ] || [ "$HTTP_CODE" -eq 201 ]; then
            echo "✅ Billing job completed successfully"
          else
            echo "❌ Billing job failed with status $HTTP_CODE"
            exit 1
          fi
      
      - name: Send notification on failure
        if: failure()
        run: |
          echo "⚠️ Billing cron job failed!"
          # 실패 시 추가 알림 로직 (예: Slack, Discord 등)
